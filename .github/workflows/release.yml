name: Release

# Publishes cross-platform release binaries when a `v*` tag is pushed.
# Runs separately from ci.yml (which fires on push/PR); a tag push is the
# sole trigger. The operator decides when to tag and push — this workflow
# only builds + attaches assets to the GitHub Release auto-created from the tag.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # required to attach assets to the tag's release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          # Stamp the same build-time metadata that `hotam version` renders.
          BUILT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILT}"
          mkdir -p dist

          # Go cross-compiles natively from a single linux runner; no per-OS
          # runner is needed. CGO is disabled to produce static binaries that
          # run on any glibc/musl/macOS/windows host.
          targets=(
            "linux/amd64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for target in "${targets[@]}"; do
            goos="${target%/*}"
            goarch="${target#*/}"
            base="dist/hotam-${VERSION}-${goos}-${goarch}"
            output="${base}"
            if [ "${goos}" = "windows" ]; then
              output="${base}.exe"
            fi
            echo "::group::Building ${goos}/${goarch} -> ${output}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "${LDFLAGS}" -o "${output}" ./cmd/hotam
            echo "::endgroup::"
          done

      - name: Archive binaries (.tar.gz for unix, .zip for windows)
        run: |
          set -euo pipefail
          cd dist
          for file in hotam-*; do
            [ -e "$file" ] || continue
            case "$file" in
              *.exe)
                base="${file%.exe}"
                zip -q "${base}.zip" "$file"
                ;;
              *)
                tar -czf "${file}.tar.gz" "$file"
                ;;
            esac
          done
          # Sanity: list the artifacts we will upload.
          ls -1

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
