name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: gofmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race
        # -timeout 30m: see Makefile's test-race target for the measured
        # rationale (two dev-machine runs of `go test ./cmd/hotam/` took
        # 1079s/1174s even with the shared-binary build already in place;
        # the floor is now a handful of serial t.Setenv tests, not
        # per-test rebuilds). -race adds further instrumentation cost on
        # top, and CI runners are typically slower than dev hardware, so
        # 30m keeps real margin here too.
        run: go test -race -timeout 30m ./...

      - name: gen-spec idempotency
        run: |
          # Regenerating the root crystals + docs/gen/ must be byte-identical
          # to what is committed. Several generated files (e.g.
          # docs/gen/AGENT-CONTEXT.md's status-counters line) embed today's
          # date as of generation time, so a bare "regenerate with the
          # runner's real today" would show a spurious date-only diff on any
          # day other than the one the committed docs were generated on —
          # noise that would drown out real drift, or (worse) fail every
          # single day regardless of actual graph changes. Pin --today to
          # the same date already embedded in the committed
          # docs/gen/AGENT-CONTEXT.md so this check compares "regenerate
          # with the SAME today as the committed tree", the only comparison
          # that is meaningful for a byte-identity check (see
          # R-drift-structurally-impossible and the --today flag on
          # `hotam gen-spec`).
          pinned_today=$(grep -oE '\(as of [0-9]{4}-[0-9]{2}-[0-9]{2}\)' domains/hotam-spec-self/docs/gen/AGENT-CONTEXT.md | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          if [ -z "$pinned_today" ]; then
            echo "::error::could not extract the committed today-date from docs/gen/AGENT-CONTEXT.md"
            exit 1
          fi
          echo "pinning --today=$pinned_today (extracted from the committed docs/gen/AGENT-CONTEXT.md)"
          go run ./cmd/hotam gen-spec --domain domains/hotam-spec-self --claude-md CLAUDE.md --today "$pinned_today"
          git diff --exit-code -- \
            CLAUDE.md \
            AGENTS.md \
            GEMINI.md \
            domains/hotam-spec-self/docs/gen/
